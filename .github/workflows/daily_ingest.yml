name: Daily Corporate Actions Ingestion & Analysis

on:
  schedule:
    - cron: '0 11 * * 1-5'    # Mon-Fri, 16:30 IST (11:00 UTC) — after Indian market close
  workflow_dispatch:           # Manual trigger from Actions tab

jobs:
  ingest-and-analyze:
    name: Ingest & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run database migration (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python db/migrate.py

      - name: Ingest prices and corporate actions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ingest.py

      - name: Run consistency analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/analyze.py

      - name: Write job summary
        if: always()
        run: |
          echo "## Pipeline run: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
